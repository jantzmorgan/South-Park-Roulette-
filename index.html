<!DOCTYPE html>
<html>

<head>
	<title>South Park Episode Roulette</title>

	<link rel="stylesheet" href="style.css?v=4">

	<meta name="viewport" content="width=device-width, initial-scale=1.0">

	<meta charset="UTF-8">
</head>

<body>

	<div class="header-bg">
	<h1>South Park <br /> Episode <br /> Roulette</h1>
  </div>
	<button id="pickBtn">Pick Random Episode</button>
	<label class="classic-toggle">
		<input type="checkbox" id="classicMode">
		Classic Seasons Only (1-8)
	</label>
	<button id="paramountBtn">
		Open Episode
	</button>

	<p id="result"></p>
	<button id="saveBtn">Save Favorite</button>

	<section id="favoritesSection">

		<button id="sortRatingBtn">Sort by Rating</button>
		<button id="sortSeasonBtn">Sort by Season</button>

		<h2>Favorite Episodes</h2>
		<div id="favoritesList"></div>
	</section>

	<section id="recentSection">
		<h2>Last 10 Episodes</h2>
		<p id="recentHint">Tap an episode to select it</p>
		<div id="recentList"></div>
	</section>

	<footer>
		Unofficial fan-made <br> random episode picker.<br>
		South Park and related trademarks belong to <br> their respective owners.
	</footer>

	<script src="script.js"></script>

</body>

</html>
